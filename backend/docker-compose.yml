version: '3.8'

services:

  # =====================================================
  # 🐘 PostgreSQL
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: mobile_ptit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mobile_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/init_data.sql:/docker-entrypoint-initdb.d/init_data.sql:ro
    networks:
      - mobile_ptit_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d mobile_app_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # 🔴 Redis
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: mobile_ptit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mobile_ptit_network
    command: redis-server --appendonly yes --requirepass redis123
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "redis123", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mobile_ptit_network:
    driver: bridge
