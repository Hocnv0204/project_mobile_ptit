spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mobile_app_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Redis hiện để OPTIONAL: không cần chạy Redis vẫn khởi động được backend.
  # Khi cần dùng Redis/Spring Session Redis thì cấu hình và bật lại sau.
  session:
    store-type: none

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Redis: nếu chưa dùng tới thì không cần cấu hình (backend vẫn chạy).
# Khi cần, bạn có thể bật lại cấu hình bên dưới:
# spring:
#   data:
#     redis:
#       host: localhost
#       port: 6379

management:
  health:
    redis:
      enabled: false
