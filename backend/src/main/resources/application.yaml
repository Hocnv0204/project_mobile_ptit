spring:
  application:
    name: backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mobile_app_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

  session:
    store-type: none

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    # ignore-missing-migrations: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:3000ms}

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

management:
  health:
    redis:
      enabled: true

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:90000000} # 15 phút (ms)
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000} # 7 ngày (ms)

otp:
  expiration: ${OTP_EXPIRATION:300000} # 5 phút (ms)
  length: ${OTP_LENGTH:6}
  sender-name: ${OTP_SENDER_NAME:"PTIT English App"}

# Google OAuth2 — Web client (verify id_token aud); Android client khi token cấp cho app native
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  android-client-id: ${GOOGLE_ANDROID_CLIENT_ID:}

groq:
  api-key: ${GROQ_API_KEY:}
  model: ${GROQ_MODEL:llama-3.1-8b-instant}
  base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-1.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

ai:
  provider: ${AI_PROVIDER:groq}
