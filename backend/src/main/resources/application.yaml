spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mobile_app_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Redis hiện để OPTIONAL: không cần chạy Redis vẫn khởi động được backend.
  # Khi cần dùng Redis/Spring Session Redis thì cấu hình và bật lại sau.
  session:
    store-type: none

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true   # Cho phép Flyway chạy khi schema đã tồn tại (tạo bởi docker init.sql)
    baseline-version: 0         # Đánh dấu baseline là version 0
    locations: classpath:db/migration

  # Redis: nếu chưa dùng tới thì không cần cấu hình (backend vẫn chạy).
  # Khi cần, bạn có thể bật lại cấu hình bên dưới:
  # data:
  #   redis:
  #     host: localhost
  #     port: 6379
  #     password: redis123

management:
  health:
    redis:
      enabled: false
